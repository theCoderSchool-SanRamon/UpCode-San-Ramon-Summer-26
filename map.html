<!DOCTYPE html>
<html>
	<head>
	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
	</head>
	<body>
		<div id="app" class="master-container">
			<div id="map-container" v-html="mapHtml"></div>
			<div id="overlay-container"></div>
		</div>
		<script>
			const { createApp, ref, onMounted } = Vue;

			createApp({
			  setup() {
				const mapHtml = ref('');

					onMounted(() => {
						fetch("leafletmap.html")
							.then(response => response.text())
							.then(data => {
								mapHtml.value = data;
							});
						});

					return { mapHtml };
			  }
			}).mount('#app');
		</script>
	</body>
</html>
