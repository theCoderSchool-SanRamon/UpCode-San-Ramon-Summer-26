<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.1.0/ol.css">
		<script src="https://cdn.jsdelivr.net/npm/ol@v9.1.0/dist/ol.js"></script>
		<script src="mappablecounties.js"></script>
		<script src="states.js"></script>
		<style>
			#map {
				height: 1200px;
				width: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script type="module">
			const map = new ol.Map({
				target: 'map',
				layers: [
					new ol.layer.Tile({
						source: new ol.source.OSM()
					})
				],
				view: new ol.View({
					center: ol.proj.fromLonLat([-101.34, 38]),
					zoom: 5
				})
			});

			function getColor(d) {
				return d == null ? '#cfcfcf' : d > 500 ? '#800026' : d > 450 ? '#BD0026' : d > 400 ? '#E31A1C' : d > 350 ? '#FC4E2A' : d > 300 ? '#FD8D3C' : d > 250 ? '#FEB24C' : d > 200 ? '#FED976' : '#FFEDA0';
			}

			const countyStyle = function(feature) {
				return new ol.style.Style({
					fill: new ol.style.Fill({
						color: getColor(feature.get('ratio'))
					}),
					stroke: new ol.style.Stroke({
						color: 'white',
						width: 0.5
					})
				});
			};

			const stateStyle = new ol.style.Style({
				fill: new ol.style.Fill({
					color: 'rgba(255, 255, 255, 0)'
				}),
				stroke: new ol.style.Stroke({
					color: 'black',
					width: 1
				})
			});

			const countyLayer = new ol.layer.Vector({
				source: new ol.source.Vector({
					features: new ol.format.GeoJSON().readFeatures(countyData, {
						featureProjection: 'EPSG:3857'
					})
				}),
				style: countyStyle
			});

			const stateLayer = new ol.layer.Vector({
				source: new ol.source.Vector({
					features: new ol.format.GeoJSON().readFeatures(stateData, {
						featureProjection: 'EPSG:3857'
					})
				}),
				style: stateStyle
			});

			map.addLayer(countyLayer);
			map.addLayer(stateLayer);
		</script>
	</body>
</html>
