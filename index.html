<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
		<script src="mappablecounties.js"></script>
		<script src="countydata.js"></script>
		<script src="states.js"></script>
		<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body, #app {
				height: 100%;
				overflow: hidden;
			}
			#app {
				display: flex;
				flex-direction: row;
				position: relative;
			}
			#sidebar {
				width: 280px;
				flex-shrink: 0;
				background: white;
				box-shadow: 2px 0 8px rgba(0,0,0,0.15);
				display: flex;
				flex-direction: column;
				z-index: 1000;
				padding: 16px;
				gap: 12px;
			}
			#mode-select {
				width: 100%;
				padding: 8px 10px;
				font: 14px Arial, sans-serif;
				border: 1px solid #ccc;
				border-radius: 4px;
				outline: none;
				background: white;
				cursor: pointer;
			}
			#mode-select:focus {
				border-color: #666;
			}
			.search-input {
				width: 100%;
				padding: 8px 10px;
				font: 14px Arial, sans-serif;
				border: 1px solid #ccc;
				border-radius: 4px;
				outline: none;
			}
			.search-input:focus {
				border-color: #666;
			}
			.suggestions {
				list-style: none;
				max-height: calc(100vh - 140px);
				overflow-y: auto;
				border: 1px solid #ddd;
				border-radius: 4px;
			}
			.suggestions li {
				padding: 8px 10px;
				font: 13px Arial, sans-serif;
				cursor: pointer;
				border-bottom: 1px solid #f0f0f0;
				color: #333;
			}
			.suggestions li:last-child {
				border-bottom: none;
			}
			.suggestions li:hover {
				background: #f5f5f5;
			}
			#map-wrapper {
				flex: 1;
				position: relative;
			}
			#map {
				height: 100%;
				width: 100%;
			}
			.hover-box {
				z-index: 5555;
				pointer-events: none;
				position: fixed;
				padding: 6px 8px;
				font: 14px/16px Arial, Helvetica, sans-serif;
				background: rgba(255,255,255,0.9);
				box-shadow: 0 0 15px rgba(0,0,0,0.2);
				border-radius: 5px;
			}
			.hover-box h4 {
				margin: 0 0 5px;
				color: #777;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<div id="sidebar">
				<select id="mode-select" v-model="searchMode">
					<option value="county">Search by County</option>
					<option value="city">Search by City</option>
				</select>
				<input
					v-if="searchMode === 'county'"
					class="search-input"
					type="text"
					placeholder="Search county..."
					v-model="searchQuery"
					@blur="handleBlur"
					autocomplete="off"
				/>
				<ul class="suggestions" v-if="searchMode === 'county' && searchQuery.length > 0 && filteredCounties.length > 0">
					<li
						v-for="county in filteredCounties"
						:key="county.key"
						@mousedown.prevent="selectCounty(county)"
					>
						{{ county.name }}, {{ county.state }}
					</li>
				</ul>
				<input
					v-if="searchMode === 'city'"
					class="search-input"
					type="text"
					placeholder="Search city..."
					v-model="cityQuery"
					@blur="handleCityBlur"
					autocomplete="off"
				/>
				<ul class="suggestions" v-if="searchMode === 'city' && citySuggestions.length > 0">
					<li
						v-for="city in citySuggestions"
						:key="city.place_id"
						@mousedown.prevent="selectCity(city)"
					>
						{{ city.display }}
					</li>
				</ul>
			</div>
			<div id="map-wrapper">
				<div id="map"></div>
				<div class="hover-box" v-show="isHovering && panning<=0" :style="{left: mouseX + 12 + 'px', top: mouseY + 20 + 'px'}" v-html="infoHTML"></div>
			</div>
		</div>
		<script type="module">
			await stateData;
			await countyGeometry;
			const { createApp } = Vue;
			const app = createApp({
				data() {
					return {
						isHovering: false,
						panning: 0,
						map: null,
						mouseX: 50,
						mouseY: 50,
						mouseX2: 50,
						mouseY2: 50,
						colorMaxVal: 50,
						infoHTML: "",
						searchQuery: "",
						allCounties: [],
						countyLayers: {},
						highlightedLayer: null,
						searchMode: 'county',
						cityQuery: "",
						citySuggestions: [],
						cityDebounceTimer: null,
					};
				},
				computed: {
					filteredCounties() {
						const q = this.searchQuery.toLowerCase();
						if (!q) return [];
						const startsWith = [];
						const includes = [];
						for (const c of this.allCounties) {
							const nameLower = c.name.toLowerCase();
							const fullLower = nameLower + ', ' + c.state.toLowerCase();
							if (nameLower.startsWith(q)) {
								startsWith.push(c);
							} 
							else if (fullLower.includes(q)) {
								includes.push(c);
							}
						}
						return [...startsWith, ...includes].slice(0, 12);
					}
				},
				watch: {
					cityQuery(val) {
						clearTimeout(this.cityDebounceTimer);
						if (!val.trim()) { this.citySuggestions = []; return; }
						this.cityDebounceTimer = setTimeout(() => this.fetchCities(val), 350);
					},
				},
				mounted() {
					this.initMap();
				},
				methods: {
					handleBlur() {
						this.searchQuery = "";
					},
					handleCityBlur() {
						this.cityQuery = "";
						this.citySuggestions = [];
					},
					async fetchCities(query) {
						try {
							const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=8&countrycodes=us&addressdetails=1`;
							const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
							const data = await res.json();
							this.citySuggestions = data
								.filter(r => r.lat && r.lon)
								.map(r => {
									const addr = r.address || {};
									const city = addr.city || addr.town || addr.village || addr.municipality || r.name;
									const state = addr.state || '';
									return { place_id: r.place_id, display: state ? `${city}, ${state}` : city, lat: parseFloat(r.lat), lon: parseFloat(r.lon) };
								});
						} 
						catch (e) {
							this.citySuggestions = [];
						}
					},
					selectCity(city) {
						this.map.setView([city.lat, city.lon], 11);
						this.cityQuery = "";
						this.citySuggestions = [];
					},
					updateInfo(key) {
						this.infoHTML = '<h4>County Price Info</h4>' + (countyProperties[key] ?
							'<b>' + key.replace("_", ", ") + '</b><br />' + (countyProperties[key].ratio == null ? "N/A" : 'Price/Rent Ratio: <b>' + (countyProperties[key].ratio/12).toFixed(2) + '</b><br>Median Contract Rent: $<b>' + countyProperties[key].rent.toString() + '</b>/mo<br>Median House Price: $<b>' + countyProperties[key].houseprice.toString()  + '</b>')
							: 'Hover over a county');
					},
					getColor(d) {
						return d == null ? '#CFCFCF' : this.getColorMix(
							(100*(Math.min(d/12,this.colorMaxVal)/this.colorMaxVal)) < 50 ? `color-mix(
							in srgb, 
							green, 
							yellow ${(100*(Math.min(d/12,this.colorMaxVal)/this.colorMaxVal))*2}%)`
							: `color-mix(
							in srgb, 
							yellow, 
							red ${((100*(Math.min(d/12,this.colorMaxVal)/this.colorMaxVal))-50)*2}%)`
						);
					},
					getColorMix(s) {
						const cnv = document.createElement("canvas").getContext("2d");
						cnv.fillStyle = s;
						return cnv.fillStyle;
					},
					styleFeature(feature) {
						return {fillColor: this.getColor(countyProperties[feature.properties.name + '_' + feature.properties.state].ratio), weight: 0.5, opacity: 0.5, color: 'white', fillOpacity: 0.7};
					},
					updateMouse(e) {
						this.mouseX = e.originalEvent.clientX;
						this.mouseY = e.originalEvent.clientY;
					},
					selectCounty(county) {
						const layer = this.countyLayers[county.key];
						if (!layer) return;
						if (this.highlightedLayer) {
							this.highlightedLayer.setStyle(this.styleFeature(this.highlightedLayer.feature));
						}
						layer.setStyle({weight: 4, color: '#F0CC00'});
						layer.bringToFront();
						this.highlightedLayer = layer;
						this.map.fitBounds(layer.getBounds());
						this.searchQuery = "";
					},
					initMap() {
						this.map = L.map('map', {worldCopyJump: true, removeOutsideVisibleBounds: false, preferCanvas: true}).setView([38, -101.34], 5);
						L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18, attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>', referrerPolicy: "origin"}).addTo(this.map);

						const onEachFeature = (feature, layer) => {
							const key = feature.properties.name + '_' + feature.properties.state;
							this.countyLayers[key] = layer;
							layer.on({
								mouseover: (e) => {
									this.isHovering = true;
									this.updateInfo(key);
									if (this.highlightedLayer) {this.highlightedLayer.setStyle(this.styleFeature(this.highlightedLayer.feature));}
								},
								mouseout: (e) => {
									this.isHovering = false;
								},
								click: e =>{
									this.map.fitBounds(e.target.getBounds());
									this.updateInfo(key);
									this.panning = 0;
								}
							});
						};
						this.map.on({
							dragstart: () => this.panning += 1,
							dragend: () => (this.panning > 0) ? this.panning -=1 : this.panning = 0,
							mousemove: (e) => this.updateMouse(e),
							mouseup: (e) => this.updateMouse(e),
							zoomstart: () => this.panning += 1,
							zoomend: () => (this.panning > 0) ? this.panning -=1 : this.panning = 0,
						})
						L.geoJson(countyGeometry, {style: this.styleFeature, onEachFeature: onEachFeature, renderer: L.canvas({padding: 2.2})}).addTo(this.map);
						L.geoJson(stateData, {style: {fillOpacity: 0, weight: 1}, interactive: false, renderer: L.svg({padding: 2.2})}).addTo(this.map);

						const counties = countyGeometry.features.map(f => ({
							name: f.properties.name,
							state: f.properties.state,
							key: f.properties.name + '_' + f.properties.state,
						}));
						counties.sort((a, b) => a.name.localeCompare(b.name) || a.state.localeCompare(b.state));
						this.allCounties = counties;
					}
				}
			});
			app.mount("#app");
		</script>
	</body>
</html>
