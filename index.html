<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
		<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body, #app {
				height: 100%;
				overflow: hidden;
				transform: translate3d(0,0,0); 
			}
			#app {
				display: flex;
				flex-direction: row;
				position: relative;
			}
			#infopanel-shade {
				height: 100%;
				width: 100%;
				backdrop-filter: blur(2px);
				background: rgba(115, 115, 115, 0.5);
				z-index: 101;
				position: absolute;
				top: 0;
				left: 0;

			}
			#infopanel {
				width: 65%;
				height: 65%;
				z-index: 102;
				padding: 16px;
				margin-left: 17.5%;
				margin-top: 11.6%;
				background: white;
				border-radius: 8px;
			}
			.v-enter-active, .v-leave-active {
				transition: opacity 0.5s ease;
			}
			.v-enter-from, .v-leave-to {
				opacity: 0;
			}

			.v-enter-active #infopanel,
			.v-leave-active #infopanel {
				transition: transform 0.4s cubic-bezier(0.16, 1, 0.5, 1);
			}
			.v-enter-from #infopanel {
				transform: scale(0.9) translateY(130%);
			}
			.v-leave-to #infopanel {
				transform: scale(0.9);
			}

			#sidebar {
				width: 280px;

				flex-shrink: 0;
				position: fixed;
				/*height: calc(100% - 16px);*/
				border-radius: 8px;
				/*background: rgba(255,255,255,0.5);
				backdrop-filter: blur(5px)
				box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);*/
				display: flex;
				z-index: 100;
				padding: 16px;
				margin: 8px;
				gap: 12px;
			}
			#search-wrapper {
				flex-direction: column;
				width: 85%;
				scrollbar-color: rgba(255,255,255,0.75) transparent;
				
			}
			#mode-select {
				font: 0px Arial, sans-serif;
				border: 1px solid #ccc;
				border-radius: 8px;
				outline: none;
				flex: none;
				
				width: 15%;
				background: white;
				cursor: pointer;
 				max-height: 32px; 
				user-select: none;
			}
			#mode-select:focus {
				border-color: #666;
			}
			.search-input {
				width: 100%;
				background: rgba(255,255,255,0.5);
				backdrop-filter: blur(5px);
				padding: 8px 10px;
				font: 14px Arial, sans-serif;
				border: 1px solid #ccc;
				border-radius: 14px;
				outline: none;
			}
			.search-input:focus {
				border-color: #666;
			}
			.suggestions {
				list-style: none;
				max-height: calc(100vh - 140px);
				overflow-y: auto;
				border: 0px solid #ddd;
				border-radius: 4px;
				background: transparent;
			}
			.suggestions li {
				padding: 8px 10px;
				font: 13px Arial, sans-serif;
				cursor: pointer;
				border-radius: 4px;
				margin: 2px;
				
				background: rgba(255, 255, 255, 0.666);
				backdrop-filter: blur(3px);
				border: 0.5px solid #f0f0f0;
				color: #333;
				transition: 
					margin 0.2s ease-in-out;
			}
			.suggestions li:last-child {
				border-bottom: none;
			}
			.suggestions li:hover {
				background-color: #f5f5f5;
				margin-left: 4px;
			}
			#map-wrapper {
				flex: 1;
				position: relative;
			}
			#map {
				height: 100%;
				width: 100%;
				position: fixed;
			}
			.hover-box {
				z-index: 5555;
				pointer-events: none;
				position: fixed;
				padding: 6px 8px;
				font: 14px/16px Arial, Helvetica, sans-serif;
				background: rgba(255,255,255,0.5);
				backdrop-filter: blur(5px);
				box-shadow: 0 0 15px rgba(0,0,0,0.2);
				border-radius: 5px;
				user-select: none;
			}
			.hover-box h4 {
				margin: 0 0 5px;
				color: #777;
			}
			.leaflet-control-container {
				user-select: none;
			}
			#load-splash {
				background-color: white;
				color: white;
				display: block;
				font-size: 64px;
				left: 0;
				width: 100%;
				height: 100%;
				align-content: center;
				overflow: hidden;
				position: fixed;
				text-align: center;
				top: 0;
				z-index: 103;
			}
			#load-pinwheel {
				width: 10%;
			}
		</style>
	</head>
	<body>
		<div id="app">

			<div id="sidebar">
				<div id="search-wrapper">
				<input
					v-if="searchMode === 'county'"
					class="search-input"
					type="text"
					placeholder="Search county..."
					v-model="searchQuery"
					@blur="handleBlur"
					autocomplete="off"
				/>
				<Transition>
				<ul class="suggestions" v-if="searchMode === 'county' && searchQuery.length > 0 && filteredCounties.length > 0">
					<li
						v-for="county in filteredCounties"
						:key="county.key"
						@mousedown.prevent="selectCounty(county)"
					>
						{{ county.name }}, {{ county.state }}
					</li>
				</ul>
				</Transition>
				<input
					v-if="searchMode === 'city'"
					class="search-input"
					type="text"
					placeholder="Search city..."
					v-model="searchQuery"
					@blur="handleCityBlur"
					autocomplete="off"
				/>
				<Transition>
				<ul class="suggestions" v-if="searchMode === 'city' && searchSuggestions.length > 0">
					<li
						v-for="city in searchSuggestions"
						:key="city.place_id"
						@mousedown.prevent="selectCity(city)"
					>
						{{ city.display }}
					</li>
				</ul>
				</Transition>
				<input
					v-if="searchMode === 'zip'"
					class="search-input"
					type="text"
					placeholder="Search ZIP code..."
					v-model="searchQuery"
					@blur="handleZIPBlur"
					autocomplete="off"
				/>
				<Transition>
				<ul class="suggestions" v-if="searchMode === 'zip' && searchSuggestions.length > 0">
					<li
						v-for="zip in searchSuggestions"
						:key="zip.display"
						@mousedown.prevent="selectZIP(zip)"
					>
						{{ zip.display }}
					</li>
				</ul>
				</Transition>
				</div>
				<select id="mode-select" v-model="searchMode">
					<option value="county">Search by County</option>
					<option value="city">Search by City</option>
					<option value="zip">Search by ZIP code</option>
				</select>

			</div>
			
			<div id="map-wrapper">
				<div id="map"></div>
				<div class="hover-box" v-show="isHovering && panning<=0" :style="{left: mouseX + 12 + 'px', top: mouseY + 20 + 'px'}" v-html="infoHTML"></div>
							<Transition>
				<div id="infopanel-shade" v-if="showInfoPanel" @click.self="showInfoPanel=false">	
					
					<div id="infopanel" v-html="infoPanelHTML">
						
					</div>
				</div>
			</Transition>
			</div>
			<Transition>
				<div id="load-splash" v-show="appLoaded">
					<img id="load-pinwheel" src="loading-9.gif"></img>
				</div>
			</Transition>
		</div>
		<script type="module">
			var stateData = fetch("states.geojson", {headers: {'Content-Type': 'application/json'}});
			var countyGeometry = fetch("counties.geojson", {headers: {'Content-Type': 'application/json'}});
			var countyProperties = fetch("countydata.json", {headers: {'Content-Type': 'application/json'}});
			var placesGeometry = fetch("places.geojson", {headers: {'Content-Type': 'application/json'}});
			stateData = await stateData;
			countyGeometry = await countyGeometry;
			countyProperties = await countyProperties;
			placesGeometry = await placesGeometry;
			stateData = await stateData.json();
			countyGeometry = await countyGeometry.json();
			countyProperties = await countyProperties.json();
			placesGeometry = await placesGeometry.json();
			const appLoaded = true
			const { createApp } = Vue;
			const app = createApp({
				data() {
					return {
						showInfoPanel: false,

						isHovering: false,
						panning: 0,
						mouseX: 50,
						mouseY: 50,
						colorMaxVal: 50,
						cityZoomThreshold: 9,
						infoHTML: "",
						searchQuery: "",
						allCounties: [],
						searchMode: 'county',
						searchSuggestions: [],
						citySuggestions: [],
						suggestionDebounceTimer: null,
						ZIPSuggestions: [],
					};
				},
				created() {
						this.map = null;
						this.citylayer = null;
						this.countyLayer = null;
						this.countyLayers = {};
						this.highlightedLayer = null;
				},
				computed: {
					filteredCounties() {
						const q = this.searchQuery.toLowerCase();
						if (!q) return [];
						const startsWith = [];
						const includes = [];
						for (const c of this.allCounties) {
							const nameLower = c.name.toLowerCase();
							const fullLower = nameLower + ', ' + c.state.toLowerCase();
							if (nameLower.startsWith(q)) {
								startsWith.push(c);
							} 
							else if (fullLower.includes(q)) {
								includes.push(c);
							}
						}
						return [...startsWith, ...includes].slice(0, 12);
					}
				},
				watch: {
					searchQuery(val) {
						if (this.searchMode=='city') {
							clearTimeout(this.suggestionDebounceTimer);
							if (!val.trim()) { this.searchSuggestions = []; return; }
							this.suggestionDebounceTimer = setTimeout(() => this.fetchCities(val), 350);
						} else if (this.searchMode=='zip') {
							clearTimeout(this.suggestionDebounceTimer);
							if (!val.trim()) { this.searchSuggestions = []; return; }
							this.suggestionDebounceTimer = setTimeout(() => this.fetchZIP(val), 350);
						}

					},
				},
				mounted() {
					this.initMap();
				},
				methods: {
					handleBlur() {
						this.searchQuery = "";
					},
					handleCityBlur() {
						this.searchQuery = "";
						this.searchSuggestions = [];
					},
					async fetchCities(query) {
						try {
							const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=8&countrycodes=us&addressdetails=1`;
							const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
							const data = await res.json();
							const cityTypes = ['city', 'town', 'village', 'hamlet', 'municipality','borough']
							this.searchSuggestions = data
								.filter(r => {
									const hasCoords = r.lat && r.lon;
									const isCity = cityTypes.includes(r.addresstype) || cityTypes.includes(r.type);
									return hasCoords && isCity;
						})
								.map(r => {
									const addr = r.address || {};
									const city = addr.city || addr.town || addr.village || addr.municipality || r.name;
									const state = addr.state || '';
									return { place_id: r.place_id, display: state ? `${city}, ${state}` : city, lat: parseFloat(r.lat), lon: parseFloat(r.lon) };
								});
						} 
						catch (e) {
							this.searchSuggestions = [];
						}
					},
					selectCity(city) {
						this.map.setView([city.lat, city.lon], 11);
						this.searchQuery = "";
						this.searchSuggestions = [];
					},

					handleZIPBlur() {
						this.searchQuery = "";
						this.searchSuggestions = [];
					},
					async fetchZIP(query) {
						try {
							const url = `https://api.zippopotam.us/us/${encodeURIComponent(query)}`;
							const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
							const data = await res.json();
							const place = data['places'][0];
							this.searchSuggestions = [{display: `${place['place name']}, ${place['state']}`,lat: parseFloat(place.latitude), lon: parseFloat(place.longitude)}]
						} 
						catch (e) {
							this.searchSuggestions = [];
						}
					},
					selectZIP(zip) {
						this.map.setView([zip.lat, zip.lon], 11);
						this.searchQuery = "";
						this.searchSuggestions = [];
					},
					updateInfo(key) {
						this.infoHTML = '<h4>County Price Info</h4>' + (countyProperties[key] ?
							'<b>' + key.replace("_", ", ") + '</b><br />' + (countyProperties[key].houseprice == null ? "N/A" : 'Price/Rent Ratio: <b>' + (countyProperties[key].houseprice / countyProperties[key].rent /12).toFixed(2) + '</b><br>Median Contract Rent: $<b>' + countyProperties[key].rent.toString() + '</b>/mo<br>Median House Price: $<b>' + countyProperties[key].houseprice.toString()  + '</b>')
							: 'Hover over a county');
						this.infoPanelHTML = '<h4>Detailed County Information</h4>' + (countyProperties[key] ?
							'<b>' + key.replace("_", ", ") + '</b><br />' + (countyProperties[key].houseprice == null ? "N/A" : 'Price/Rent Ratio: <b>' + (countyProperties[key].houseprice / countyProperties[key].rent /12).toFixed(2) + '</b><br>Median Contract Rent: $<b>' + countyProperties[key].rent.toString() + '</b>/mo<br>Median House Price: $<b>' + countyProperties[key].houseprice.toString() + '</b><br>Population: <b>' + countyProperties[key].population.toString() + '</b><br>Annual Population Change: <b>' + countyProperties[key].populationchange.toString() + '</b>/year<br>Median Income: $<b>' + (countyProperties[key].income != null ? countyProperties[key].income.toString() : 'N/A')  + '/year</b>')
							: 'Hover over a county');
					},
					getColor(d,m,i) {
						return isNaN(d) ? '#CFCFCF' : this.getColorMix(
							(100*(Math.min(d,m)/m)) < 50 ? `color-mix(
							in srgb, 
							${i ? 'red' : 'green'}, 
							yellow ${(100*(Math.min(d,m)/m))*2}%)`
							: `color-mix(
							in srgb, 
							yellow, 
							${i ? 'green' : 'red'} ${((100*(Math.min(d,m)/m))-50)*2}%)`
						);
					},
					getColorMix(s) {
						const cnv = document.createElement("canvas").getContext("2d");
						cnv.fillStyle = s;
						return cnv.fillStyle;
					},
					styleFeature(feature) {
						const county = countyProperties[feature.properties.name + '_' + feature.properties.state];
						const pricetorent = (county.houseprice/county.rent)/12;
						/*const col = this.getColor(this.searchMode=='county' ? pricetorent : county.population,this.searchMode=='county' ? this.colorMaxVal : 70000, this.searchMode!='county');*/app
						const col = this.getColor(pricetorent,this.colorMaxVal,false);
						return {fillColor: col, color: col, weight: 12, opacity: 0.05, fillOpacity: 0.7};
					},
					updateMouse(e) {
						this.mouseX = e.originalEvent.clientX;
						this.mouseY = e.originalEvent.clientY;
					},
					selectCounty(county) {
						const layer = this.countyLayers[county.key];
						if (!layer) return;
						if (this.highlightedLayer) {
							this.highlightedLayer.setStyle(this.styleFeature(this.highlightedLayer.feature));
						}
						layer.setStyle({weight: 4, color: '#F0CC00'});
						layer.bringToFront();
						this.highlightedLayer = layer;
						this.map.fitBounds(layer.getBounds());
						this.searchQuery = "";
					},
					updateCityVisibility() {
						const zoom = this.map.getZoom();
						if (zoom >= this.cityZoomThreshold) {
							if (!this.map.hasLayer(this.citylayer)) {
								this.citylayer.addTo(this.map);
							}
						} else {
							if (this.map.hasLayer(this.citylayer)) {
								this.map.removeLayer(this.citylayer);
							}
						}
					},
					refreshCountyColoring() {
						this.countyLayer.setStyle(this.styleFeature);
					},
					initMap() {
						this.map = L.map('map', {worldCopyJump: true, zoomControl: false, removeOutsideVisibleBounds: false, preferCanvas: true, bounceAtZoomLimits: false,}).setView([38, -101.34], 5);
						L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18, attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>', referrerPolicy: "origin", renderer: L.canvas()}).addTo(this.map);

						const onEachCountyFeature = (feature, layer) => {
							const key = feature.properties.name + '_' + feature.properties.state;
							this.countyLayers[key] = layer;
							layer.on({
								mouseover: (e) => {
									this.isHovering = true;
									this.updateInfo(key);
									if (this.highlightedLayer) {this.highlightedLayer.setStyle(this.styleFeature(this.highlightedLayer.feature));}
								},
								mouseout: (e) => {
									this.isHovering = false;
								},
								click: e =>{
									this.updateInfo(key);
									this.panning = 0;
									this.showInfoPanel = true;
									this.refreshCountyColoring();
								}
							});
						};
						this.map.on({
							dragstart: () => this.panning += 1,
							dragend: () => (this.panning > 0) ? this.panning -=1 : this.panning = 0,
							mousemove: (e) => this.updateMouse(e),
							mouseup: (e) => this.updateMouse(e),
							zoomstart: () => this.panning += 1,
							zoomend: () => {
								(this.panning > 0) ? this.panning -=1 : this.panning = 0;
								this.updateCityVisibility();
							}
						})
						this.countyLayer = L.geoJson(countyGeometry, {style: this.styleFeature, onEachFeature: onEachCountyFeature, smoothFactor: 0.5, updateWhenIdle: false, renderer: L.canvas({padding: 0.25})});
						this.countyLayer.addTo(this.map);
						L.geoJson(stateData, {style: {fillOpacity: 0, weight: 1, color: 'gray'}, smoothFactor: 0, interactive: false, updateWhenIdle: false, renderer: L.svg({padding: 0.25})}).addTo(this.map);
						this.citylayer = L.geoJson(placesGeometry, {smoothFactor: 1, interactive: false, renderer: L.svg({padding: 0})});
						this.refreshCountyColoring();
						const counties = countyGeometry.features.map(f => ({
							name: f.properties.name,
							state: f.properties.state,
							key: f.properties.name + '_' + f.properties.state,
						}));
						counties.sort((a, b) => a.name.localeCompare(b.name) || a.state.localeCompare(b.state));
						this.allCounties = counties;
					}
				}
			});
			app.mount("#app");
		</script>
	</body>
</html>
